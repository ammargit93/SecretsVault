name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: secretsvault
          POSTGRES_USER: ammar
          POSTGRES_PASSWORD: "1234"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ammar -d secretsvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply Database Schema
        env:
          PGPASSWORD: "1234"
        run: |
          psql -h localhost -U ammar -d secretsvault -f init.sql

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Tests
        env:
          POSTGRES_CONN: "postgres://ammar:1234@localhost:5432/secretsvault?sslmode=disable"
          REDIS_CONN: "localhost:6379"
          USE_KMS: "false"
        run: go test -v ./tests/...
